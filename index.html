<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quântica - Gestão de Escalas</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        :root {
            --primary: #1a237e; --secondary: #0d47a1; --accent: #2979ff;
            --success: #2e7d32; --danger: #c62828; --bg: #f5f5f5; --white: #ffffff;
        }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: var(--bg); padding-bottom: 80px; }
        header { background: var(--primary); color: white; padding: 15px; text-align: center; font-weight: bold; position: sticky; top: 0; z-index: 100; }
        .container { padding: 15px; max-width: 800px; margin: auto; }
        
        nav { position: fixed; bottom: 0; width: 100%; background: white; display: flex; justify-content: space-around; padding: 12px 0; border-top: 2px solid #ddd; z-index: 100; }
        nav button { background: none; border: none; font-size: 0.8rem; cursor: pointer; display: flex; flex-direction: column; align-items: center; color: #666; }
        nav button.active { color: var(--primary); font-weight: bold; }

        .page { display: none; }
        .page.active { display: block; }

        .card { background: var(--white); border-radius: 12px; padding: 15px; margin-bottom: 15px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        h2 { font-size: 1rem; color: var(--primary); border-bottom: 2px solid #eee; padding-bottom: 8px; margin-top: 10px; }
        
        .item { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid #eee; }
        .info b { display: block; font-size: 1rem; }
        .info span { font-size: 0.8rem; color: #666; }

        .status-dot { width: 20px; height: 20px; border-radius: 50%; border: 2px solid white; box-shadow: 0 0 3px rgba(0,0,0,0.3); }
        .st-posto { background: var(--success); }
        .st-base { background: var(--accent); }
        .st-folga { background: var(--danger); }

        input, select, button.btn-p { width: 100%; padding: 12px; margin: 5px 0 10px; border-radius: 8px; border: 1px solid #ccc; box-sizing: border-box; }
        button.btn-p { background: var(--primary); color: white; border: none; font-weight: bold; cursor: pointer; }
        .btn-sec { background: #eee; border: none; padding: 8px; border-radius: 5px; font-size: 0.8rem; cursor: pointer; }

        .badge { font-size: 0.7rem; padding: 2px 6px; background: #e8eaf6; border-radius: 10px; color: var(--primary); font-weight: bold; margin-left: 5px; }
    </style>
</head>
<body>

<header>QUÂNTICA - OPERACIONAL</header>

<div class="container">
    
    <div id="painel" class="page active">
        <div style="text-align:center; font-weight:bold; margin-bottom:15px;" id="dataHoje"></div>
        
        <h2>🛡️ Supervisão (Fiscais / Inspetores)</h2>
        <div id="listaSuperv"></div>

        <h2 style="margin-top:20px;">📋 Equipe Operacional (Líderes / ASPs / Reservas)</h2>
        <div id="listaOperacional"></div>

        <div class="card" style="margin-top:20px;">
            <h3>Gerar Relatórios PDF</h3>
            <button class="btn-p" onclick="gerarRelatorioDia()">📄 Relatório Diário (Quem está de serviço)</button>
            <button class="btn-p" style="background:#455a64;" onclick="gerarRelatorioMensal()">📅 Escala Mensal Completa</button>
        </div>
    </div>

    <div id="gestao" class="page">
        <div class="card">
            <h2>Cadastrar / Editar</h2>
            <input type="hidden" id="editId">
            <input type="text" id="nome" placeholder="Nome do Funcionário">
            <input type="text" id="posto" placeholder="Nome do Posto">
            
            <label>Cargo:</label>
            <select id="cargo">
                <option value="Fiscal">Fiscal</option>
                <option value="Inspetor">Inspetor</option>
                <option value="Lider">Líder</option>
                <option value="ASP">ASP</option>
            </select>

            <label>Escala:</label>
            <select id="escala">
                <option value="12x36">12x36</option>
                <option value="6x1">6x1</option>
                <option value="5x1">5x1</option>
                <option value="4x2">4x2</option>
                <option value="2x1-folguista">2x1 Folguista (Posto/Base/Folga)</option>
            </select>
            
            <label>Data de Início:</label>
            <input type="date" id="dataInicio">
            
            <button class="btn-p" id="btnSalvar" onclick="salvar()">Salvar Informações</button>
        </div>

        <div class="card">
            <button class="btn-sec" onclick="exportarDados()">Backup (Exportar)</button>
            <button class="btn-sec" onclick="document.getElementById('fileIn').click()">Importar JSON</button>
            <input type="file" id="fileIn" style="display:none" onchange="importarDados(this)">
        </div>

        <div id="listaAdmin"></div>
    </div>
</div>

<nav>
    <button onclick="mudarPagina('painel', this)" class="active">📋 Painel</button>
    <button onclick="mudarPagina('gestao', this)">⚙️ Gestão</button>
</nav>

<script>
    let db = JSON.parse(localStorage.getItem("db_quantica_v2")) || [];

    function mudarPagina(id, btn) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        btn.classList.add('active');
        render();
    }

    function salvar() {
        const id = document.getElementById('editId').value;
        const dados = {
            id: id ? parseInt(id) : Date.now(),
            nome: document.getElementById('nome').value,
            posto: document.getElementById('posto').value,
            cargo: document.getElementById('cargo').value,
            escala: document.getElementById('escala').value,
            dataInicio: document.getElementById('dataInicio').value
        };

        if(!dados.nome || !dados.dataInicio) return alert("Preencha Nome e Data!");

        if(id) db = db.map(f => f.id === parseInt(id) ? dados : f);
        else db.push(dados);

        localStorage.setItem("db_quantica_v2", JSON.stringify(db));
        document.getElementById('editId').value = "";
        document.getElementById('nome').value = "";
        document.getElementById('posto').value = "";
        render();
        alert("Salvo com sucesso!");
    }

    function calcularStatus(f, dataAlvo = new Date()) {
        dataAlvo.setHours(0,0,0,0);
        const inicio = new Date(f.dataInicio + "T00:00:00");
        const diff = Math.floor((dataAlvo - inicio) / 86400000);
        
        if(diff < 0) return { cl: "st-folga", txt: "A iniciar" };

        if(f.escala === "12x36") return (diff % 2 === 0) ? { cl: "st-posto", txt: "Serviço" } : { cl: "st-folga", txt: "Folga" };
        if(f.escala === "6x1") return (diff % 7 < 6) ? { cl: "st-posto", txt: "Serviço" } : { cl: "st-folga", txt: "Folga" };
        if(f.escala === "5x1") return (diff % 6 < 5) ? { cl: "st-posto", txt: "Serviço" } : { cl: "st-folga", txt: "Folga" };
        if(f.escala === "4x2") return (diff % 6 < 4) ? { cl: "st-posto", txt: "Serviço" } : { cl: "st-folga", txt: "Folga" };
        if(f.escala === "2x1-folguista") {
            let r = diff % 3;
            if(r === 0) return { cl: "st-posto", txt: "No Posto" };
            if(r === 1) return { cl: "st-base", txt: "Na Base" };
            return { cl: "st-folga", txt: "Folga" };
        }
        return { cl: "st-posto", txt: "Serviço" };
    }

    function render() {
        const sup = document.getElementById("listaSuperv");
        const ope = document.getElementById("listaOperacional");
        const adm = document.getElementById("listaAdmin");
        document.getElementById("dataHoje").innerText = "Hoje: " + new Date().toLocaleDateString('pt-BR');

        sup.innerHTML = ""; ope.innerHTML = ""; adm.innerHTML = "<h3>Cadastrados</h3>";

        db.forEach(f => {
            const s = calcularStatus(f);
            const html = `
                <div class="card item">
                    <div class="info">
                        <b>${f.nome} <span class="badge">${f.cargo}</span></b>
                        <span>Posto: ${f.posto} | ${f.escala} | ${s.txt}</span>
                    </div>
                    <div class="status-dot ${s.cl}"></div>
                </div>
            `;
            
            if(f.cargo === "Fiscal" || f.cargo === "Inspetor") sup.innerHTML += html;
            else ope.innerHTML += html;

            adm.innerHTML += `
                <div class="card item">
                    <span>${f.nome} (${f.cargo})</span>
                    <button class="btn-sec" onclick="excluir(${f.id})">🗑 Excluir</button>
                </div>
            `;
        });
    }

    function excluir(id) {
        if(confirm("Deseja excluir?")) {
            db = db.filter(x => x.id !== id);
            localStorage.setItem("db_quantica_v2", JSON.stringify(db));
            render();
        }
    }

    // PDF RELATÓRIO DO DIA
    function gerarRelatorioDia() {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        doc.setFontSize(16);
        doc.text("QUÂNTICA - RELATÓRIO DE SERVIÇO DIÁRIO", 10, 15);
        doc.setFontSize(10);
        doc.text("Data: " + new Date().toLocaleDateString(), 10, 22);
        
        let y = 35;
        db.forEach(f => {
            const s = calcularStatus(f);
            if(s.txt !== "Folga") {
                doc.text(`${f.cargo}: ${f.nome} | Posto: ${f.posto} | Status: ${s.txt}`, 10, y);
                y += 8;
            }
        });
        doc.save(`relatorio_diario.pdf`);
    }

    // PDF ESCALA MENSAL
    function gerarRelatorioMensal() {
        const nomeAlvo = prompt("Digite o nome do funcionário para gerar a escala do mês:");
        const f = db.find(x => x.nome.toLowerCase().includes(nomeAlvo.toLowerCase()));
        
        if(!f) return alert("Funcionário não encontrado!");

        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        doc.text(`ESCALA MENSAL: ${f.nome} (${f.cargo})`, 10, 15);
        doc.text(`Posto: ${f.posto} | Escala: ${f.escala}`, 10, 22);

        let y = 35;
        let dataLoop = new Date();
        for(let i=0; i<30; i++) {
            const s = calcularStatus(f, dataLoop);
            doc.text(`${dataLoop.toLocaleDateString()}: ${s.txt}`, 10, y);
            y += 7;
            dataLoop.setDate(dataLoop.getDate() + 1);
            if(y > 280) { doc.addPage(); y = 20; }
        }
        doc.save(`escala_mensal_${f.nome}.pdf`);
    }

    function exportarDados() {
        const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(db));
        const dl = document.createElement('a');
        dl.setAttribute("href", dataStr);
        dl.setAttribute("download", "backup_quantica.json");
        dl.click();
    }

    function importarDados(input) {
        const reader = new FileReader();
        reader.onload = function(){
            db = JSON.parse(reader.result);
            localStorage.setItem("db_quantica_v2", JSON.stringify(db));
            render();
            alert("Dados Importados!");
        };
        reader.readAsText(input.files[0]);
    }

    render();
</script>
</body>
</html>
